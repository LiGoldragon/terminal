[package]
name         = "persona-wezterm"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.88"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona-wezterm"
description  = "Persona terminal harness control through WezTerm and durable PTYs."

[lib]
name = "persona_wezterm"
path = "src/lib.rs"

[[bin]]
name = "persona-wezterm-daemon"
path = "src/bin/persona-wezterm-daemon.rs"

[[bin]]
name = "persona-wezterm-view"
path = "src/bin/persona-wezterm-view.rs"

[[bin]]
name = "persona-wezterm-send"
path = "src/bin/persona-wezterm-send.rs"

[[bin]]
name = "persona-wezterm-capture"
path = "src/bin/persona-wezterm-capture.rs"

[[bin]]
name = "persona-wezterm-type"
path = "src/bin/persona-wezterm-type.rs"

[dependencies]
crossterm    = "0.28"
kameo        = { version = "0.20", default-features = false, features = ["tracing"] }
portable-pty = "0.8"
thiserror    = "2"
vt100        = "0.16"

[lints.rust]
unused = "warn"
dead_code = "warn"

[package]
name         = "persona-wezterm"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona-wezterm"
description  = "Persona terminal harness control through WezTerm and durable PTYs."

[lib]
name = "persona_wezterm"
path = "src/lib.rs"

[[bin]]
name = "persona-wezterm-daemon"
path = "src/bin/persona-wezterm-daemon.rs"

[[bin]]
name = "persona-wezterm-view"
path = "src/bin/persona-wezterm-view.rs"

[[bin]]
name = "persona-wezterm-send"
path = "src/bin/persona-wezterm-send.rs"

[dependencies]
crossterm    = "0.28"
portable-pty = "0.8"
ractor       = "0.13"
thiserror    = "2"

[lints.rust]
unused = "warn"
dead_code = "warn"
